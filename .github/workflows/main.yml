name: Scraper Pipeline (5-ZIP TEST)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Generate Chunks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Install Setup Dependencies
        run: pip install requests
      - name: Generate PLZ Master and Chunks
        run: |
          mkdir -p data .tmp/chunks
          python tools/plz_gen.py
          python tools/chunker.py --test 
      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: plz-chunks
          path: .tmp/chunks/

  discovery:
    name: Discovery (Scout)
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runner_index: [1, 2, 3, 4, 5]
        # Run both platforms to get complete data
        platform: [wolt, uber]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Download Chunks
        uses: actions/download-artifact@v4
        with: { name: plz-chunks, path: .tmp/chunks/ }
      - name: Install Deps
        run: pip install -r requirements.txt && sbase install chromedriver
      - name: Run Scout
        run: |
          CHUNK_NAME=$(printf "chunk_%02d.json" ${{ matrix.runner_index }})
          # Added --platform flag to support unified scouting
          python tools/scout.py --chunk-file .tmp/chunks/$CHUNK_NAME --worker-id scout-${{ matrix.platform }}-${{ matrix.runner_index }} --platform ${{ matrix.platform }}
      - name: Upload Raw URLs
        uses: actions/upload-artifact@v4
        with:
          name: raw-urls-${{ matrix.platform }}-${{ matrix.runner_index }}
          path: .tmp/results_*.jsonl

  deduplicate:
    name: Unique URL Registry
    needs: discovery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - uses: actions/download-artifact@v4
        with: { path: .tmp_all/ }
      - name: Create Unique URL Shards
        run: |
          mkdir -p .tmp/shards
          touch .tmp/unique_urls.jsonl
          # Combine all results from all platforms and workers
          find .tmp_all -type f -name "results_*.jsonl" -exec cat {} + | sort -u -t '"' -k 4,4 > .tmp/unique_urls.jsonl || true
          
          # Initialize all 5 shards as empty files so extraction matrix jobs don't fail
          for i in {1..5}; do touch ".tmp/results_ext-$i.jsonl"; done
          
          lines=$(wc -l < .tmp/unique_urls.jsonl)
          if [ "$lines" -gt 0 ]; then
            # Split into shards without leading-zero padding
            split -l $((lines/5 + 1)) .tmp/unique_urls.jsonl .tmp/shards/shard_
            # Rename shards to explicitly match matrix shard_index [1, 2, 3, 4, 5]
            i=1
            for f in .tmp/shards/shard_*; do
              if [ -e "$f" ]; then
                mv "$f" ".tmp/results_ext-$i.jsonl"
                i=$((i+1))
              fi
            done
          fi
      - name: Upload Shards
        uses: actions/upload-artifact@v4
        with:
          name: unique-shards
          path: .tmp/results_ext-*.jsonl

  extraction:
    name: Extraction
    needs: deduplicate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard_index: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - uses: actions/download-artifact@v4
        with: { name: unique-shards, path: .tmp/ }
      - name: Install Deps
        run: pip install -r requirements.txt && sbase install chromedriver
      - name: Run Extractor
        run: |
          # Extractor now finds exactly '.tmp/results_ext-1.jsonl' etc.
          python tools/extractor.py --worker-id ext-${{ matrix.shard_index }}
      - name: Upload Worker Detail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detail-${{ matrix.shard_index }}
          path: .tmp/extracted_*.jsonl

  collector:
    name: Blender & Sync
    needs: extraction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with: { path: .tmp_all/ }
      - name: Run Blender
        run: |
          mkdir -p .tmp
          find .tmp_all -name "extracted_*.jsonl" -exec cat {} + > .tmp/all_extracted.jsonl
          grep '"platform": "wolt"' .tmp/all_extracted.jsonl > .tmp/wolt_extracted.jsonl || true
          grep '"platform": "uber"' .tmp/all_extracted.jsonl > .tmp/uber_extracted.jsonl || true
          python tools/blender.py --wolt-file .tmp/wolt_extracted.jsonl --uber-file .tmp/uber_extracted.jsonl --output-json blender_output.json
      - name: Run Google Sheets Sync
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          BLENDER_OUTPUT: "blender_output.json"
        run: python tools/sync.py